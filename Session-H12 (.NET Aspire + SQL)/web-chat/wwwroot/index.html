<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <!-- Zero-dependency markdown: no external scripts needed -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 150%; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #16213e; padding: 12px 20px; border-bottom: 1px solid #0f3460; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        header h1 { font-size: 16px; font-weight: 600; color: #e94560; }
        header span { font-size: 12px; color: #888; }
        header:hover { background: #1a2745; }
        #settings { display: none; background: #0f1a2e; border-bottom: 1px solid #0f3460; padding: 10px 20px; font-size: 12px; color: #888; line-height: 1.8; }
        #settings .label { color: #e94560; font-weight: 600; }
        #settings .val { color: #aaa; font-family: 'Cascadia Code', 'Consolas', monospace; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: #0f3460; color: #fff; border-bottom-right-radius: 4px; white-space: pre-wrap; }
        .msg.assistant { align-self: flex-start; background: #16213e; border: 1px solid #0f3460; border-bottom-left-radius: 4px; }
        .msg.assistant .content { line-height: 1.6; }
        .msg.assistant .content p { margin: 0.4em 0; }
        .msg.assistant .content table { border-collapse: collapse; margin: 0.5em 0; width: 100%; }
        .msg.assistant .content th, .msg.assistant .content td { border: 1px solid #0f3460; padding: 4px 8px; text-align: left; }
        .msg.assistant .content th { background: #0f3460; color: #fff; }
        .msg.assistant .content code { background: #111827; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
        .msg.assistant .content pre { background: #111827; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 0.5em 0; }
        .msg.assistant .content ul, .msg.assistant .content ol { margin: 0.4em 0 0.4em 1.2em; }
        .msg.assistant .content strong { color: #e94560; }
        .msg.thinking { align-self: flex-start; background: #16213e; border: 1px solid #333; color: #666; font-style: italic; white-space: pre-wrap; }
        details.think-block { margin: 4px 0; border: 1px solid #333; border-radius: 6px; padding: 4px 8px; background: #111827; }
        details.think-block summary { cursor: pointer; color: #666; font-size: 12px; font-style: italic; user-select: none; }
        details.think-block summary:hover { color: #999; }
        details.think-block .think-content { margin-top: 6px; color: #888; font-size: 13px; font-style: italic; white-space: pre-wrap; border-top: 1px solid #222; padding-top: 6px; }
        #input-area { display: flex; gap: 8px; padding: 12px 20px; background: #16213e; border-top: 1px solid #0f3460; }
        #input { flex: 1; padding: 10px 14px; border: 1px solid #0f3460; border-radius: 8px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
        #input:focus { border-color: #e94560; }
        #send { padding: 10px 20px; background: #e94560; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
        #send:hover { background: #c73e54; }
        #send:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <header onclick="toggleSettings()">
        <h1>Web Chat</h1>
        <span>Azure AI + DAB MCP — click for settings</span>
    </header>
    <div id="settings"></div>
    <div id="messages"></div>
    <div id="input-area">
        <input id="input" type="text" placeholder="Ask about products, categories, inventory..." autofocus />
        <button id="send">Send</button>
    </div>
    <script>
        const messages = [];
        const msgDiv = document.getElementById('messages');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const settingsDiv = document.getElementById('settings');
        let settingsLoaded = false;

        async function toggleSettings() {
            if (!settingsLoaded) {
                try {
                    const res = await fetch('/api/settings');
                    const s = await res.json();
                    settingsDiv.innerHTML =
                        `<span class="label">Endpoint:</span> <span class="val">${s.foundry.endpoint}</span><br>` +
                        `<span class="label">Model:</span> <span class="val">${s.foundry.model}</span><br>` +
                        `<span class="label">MCP URL:</span> <span class="val">${s.mcp.url}</span>`;
                    settingsLoaded = true;
                } catch (e) {
                    settingsDiv.innerHTML = `<span class="val">Error loading settings</span>`;
                }
            }
            settingsDiv.style.display = settingsDiv.style.display === 'none' ? 'block' : 'none';
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // Zero-dependency markdown → HTML (handles what the model actually produces)
        function md(text) {
            // Tables: header | sep | rows
            text = text.replace(/^(\|.+\|)\r?\n(\|[\s:|-]+\|)\r?\n((?:\|.+\|\r?\n?)+)/gm, function(_, hdr, sep, body) {
                const cols = hdr.split('|').filter(c => c.trim());
                const aligns = sep.split('|').filter(c => c.trim()).map(c =>
                    /:-+:/.test(c) ? 'center' : /-+:/.test(c) ? 'right' : 'left');
                const th = cols.map((c, i) =>
                    `<th style="text-align:${aligns[i]||'left'}">${c.trim()}</th>`).join('');
                const rows = body.trim().split('\n').map(r => {
                    const cells = r.split('|').filter(c => c.trim());
                    return '<tr>' + cells.map((c, i) =>
                        `<td style="text-align:${aligns[i]||'left'}">${c.trim()}</td>`).join('') + '</tr>';
                }).join('');
                return `<table><thead><tr>${th}</tr></thead><tbody>${rows}</tbody></table>`;
            });
            // Bold **text**
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Italic *text*
            text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
            // Inline code `text`
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Unordered lists
            text = text.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
            text = text.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');
            // Line breaks → paragraphs
            text = text.split(/\n{2,}/).map(p => p.trim()).filter(Boolean)
                .map(p => p.startsWith('<table') || p.startsWith('<ul') ? p : `<p>${p}</p>`).join('');
            // Single newlines within paragraphs → <br>
            text = text.replace(/([^>])\n([^<])/g, '$1<br>$2');
            return text;
        }

        function renderContent(text) {
            // Strip raw JSON tool-call payloads (single-line and multi-line)
            text = text.replace(/^\s*\{[^{}]*("entity"|"keys"|"fields"|"toolName"|"status"|"cursor"|"isError"|"result"|"content")[^{}]*\}\s*$/gm, '').trim();
            // Strip multi-line JSON blocks (nested braces) that look like MCP envelopes
            text = text.replace(/^\s*\{[\s\S]*?("isError"\s*:|"type"\s*:\s*"response"|"status"\s*:\s*"success")[\s\S]*?\}\s*$/gm, '').trim();
            // Strip narration about tool-call mechanics
            text = text.replace(/^.*(?:The\s+create_record\s+call|resending\s+correctly|How\s+to\s+interpret|had\s+to\s+be\s+sent).*$/gim, '').trim();
            // Collapse leftover blank lines
            text = text.replace(/\n{3,}/g, '\n\n').trim();
            // Split on <think>...</think> blocks
            const parts = text.split(/(<think>[\s\S]*?<\/think>)/g);
            let html = '';
            for (const part of parts) {
                const m = part.match(/^<think>([\s\S]*?)<\/think>$/);
                if (m) {
                    html += `<details class="think-block"><summary>💭 Thinking…</summary><div class="think-content">${escHtml(m[1].trim())}</div></details>`;
                } else if (part.trim()) {
                    html += `<span class="content">${md(part)}</span>`;
                }
            }
            return html;
        }

        function addMessage(role, content, isHtml) {
            messages.push({ role, content });
            const el = document.createElement('div');
            el.className = `msg ${role}`;
            if (isHtml) {
                el.innerHTML = content;
            } else {
                el.textContent = content;
            }
            msgDiv.appendChild(el);
            msgDiv.scrollTop = msgDiv.scrollHeight;
            return el;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            sendBtn.disabled = true;

            const thinking = addMessage('thinking', 'Thinking...');

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });

                thinking.remove();

                const data = await res.json();
                // Strip <think> blocks from history so the model doesn't see its own reasoning in future turns
                const cleanAnswer = data.answer.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
                messages.push({ role: 'assistant', content: cleanAnswer });
                const el = document.createElement('div');
                el.className = 'msg assistant';
                el.innerHTML = renderContent(data.answer);
                msgDiv.appendChild(el);
                msgDiv.scrollTop = msgDiv.scrollHeight;
            } catch (e) {
                thinking.remove();
                addMessage('assistant', `Error: ${e.message}`);
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        sendBtn.addEventListener('click', send);
        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !sendBtn.disabled) send(); });
    </script>
</body>
</html>
